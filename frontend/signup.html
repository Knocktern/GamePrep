<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GamePrep Signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="signup">
  <div class="scanlines"></div>
  <div class="wrap">
    <div class="top-bar">
      <div class="logo">GamePrep</div>
      <div class="top-bar-tag">Signup</div>
    </div>

    <section class="panel">
      <h2>Sign Up</h2>
      <p class="panel-sub">Create the gamer account.</p>
      <div class="form-row">
        <input id="username" type="text" maxlength="50" placeholder="Username">
        <input id="password" type="password" placeholder="Password (min 6 chars)">
      </div>
      <button id="signupBtn" type="button">Sign Up</button>
      <div id="authMessage" class="status-message" aria-live="polite"></div>
      <p class="hint">Already have an account? <a href="login.html">Log in</a>.</p>
    </section>
  </div>

  <script src="auth.js"></script>
</body>
</html>
